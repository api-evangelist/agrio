naftiko: 1.0.0-alpha2
info:
  label: Agrio Agriculture API — Crops
  description: 'Agrio Agriculture API — Crops. 1 operations. Lead operation: Agrio Get Supported Crops. Self-contained Naftiko
    capability covering one Agrio business surface.'
  tags:
  - Agrio
  - Crops
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGRIO_API_KEY: AGRIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: agrio-crops
    baseUri: https://agrio-api-gateway-6it0wqn1.uc.gateway.dev
    description: Agrio Agriculture API — Crops business capability. Self-contained, no shared references.
    resources:
    - name: v1-get-supported-crops
      path: /v1/get-supported-crops
      operations:
      - name: getsupportedcrops
        method: GET
        description: Agrio Get Supported Crops
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: Bearer token for API authentication.
          required: true
    authentication:
      type: bearer
      token: '{{env.AGRIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: agrio-crops-rest
    port: 8080
    description: REST adapter for Agrio Agriculture API — Crops. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/get-supported-crops
      name: v1-get-supported-crops
      description: REST surface for v1-get-supported-crops.
      operations:
      - method: GET
        name: getsupportedcrops
        description: Agrio Get Supported Crops
        call: agrio-crops.getsupportedcrops
        with:
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: agrio-crops-mcp
    port: 9090
    transport: http
    description: MCP adapter for Agrio Agriculture API — Crops. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: agrio-get-supported-crops
      description: Agrio Get Supported Crops
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agrio-crops.getsupportedcrops
      with:
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
